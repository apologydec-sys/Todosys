<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Modern Todo Application - Organize your tasks efficiently">
    <meta name="author" content="TodosApp">

    <!-- ── PWA Meta Tags ─────────────────────────────────────────── -->
    <meta name="application-name" content="TodosApp">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS / Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TodosApp">
    {% load static %}
    <link rel="apple-touch-icon" href="{% static 'icons/icon-192.svg' %}">

    <!-- Windows / Edge PWA -->
    <meta name="msapplication-TileColor" content="#667eea">
    <meta name="msapplication-TileImage" content="{% static 'icons/icon-192.svg' %}">
    <meta name="msapplication-tap-highlight" content="no">

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{% static 'icons/icon-192.svg' %}">
    <link rel="shortcut icon" href="{% static 'icons/icon-192.svg' %}">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm" crossorigin="anonymous"/>

    <title>{% block title %}{% endblock %}</title>

    <style>
      /* ── Reminder toasts ─────────────────────────────────────── */
      #reminder-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        max-width: 360px;
      }
      .reminder-toast {
        background: #fff;
        border-left: 5px solid #f39c12;
        border-radius: 6px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.18);
        padding: 14px 18px;
        margin-top: 10px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        animation: slideIn 0.4s ease;
      }
      .reminder-toast .toast-icon { font-size: 1.4rem; color: #f39c12; margin-top: 2px; }
      .reminder-toast .toast-body { flex: 1; }
      .reminder-toast .toast-title { font-weight: 700; font-size: 0.95rem; color: #333; margin-bottom: 2px; }
      .reminder-toast .toast-text  { font-size: 0.85rem; color: #555; }
      .reminder-toast .toast-close {
        background: none; border: none; font-size: 1.1rem;
        color: #aaa; cursor: pointer; padding: 0; line-height: 1;
      }
      .reminder-toast .toast-close:hover { color: #333; }
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(60px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      /* ── PWA install banner ──────────────────────────────────── */
      #pwa-install-banner {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 14px 20px;
        z-index: 10000;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        box-shadow: 0 -4px 16px rgba(0,0,0,0.2);
      }
      #pwa-install-banner.show { display: flex; }
      #pwa-install-banner .banner-text { flex: 1; font-size: 0.95rem; }
      #pwa-install-banner .banner-text strong { display: block; font-size: 1rem; }
      #pwa-install-banner .btn-install {
        background: white; color: #667eea; font-weight: 700;
        border: none; border-radius: 50px; padding: 8px 22px;
        cursor: pointer; white-space: nowrap; font-size: 0.9rem;
      }
      #pwa-install-banner .btn-install:hover { background: #f0f0f0; }
      #pwa-install-banner .btn-dismiss {
        background: none; border: none; color: rgba(255,255,255,0.7);
        font-size: 1.3rem; cursor: pointer; padding: 0 4px; line-height: 1;
      }
      #pwa-install-banner .btn-dismiss:hover { color: white; }
    </style>
  </head>
  <body>
    {% include 'partials/nav.html' %}

    {% block content %}{% endblock %}

    <!-- Reminder toast container -->
    <div id="reminder-container" aria-live="polite" aria-label="Task reminders"></div>

    <!-- PWA Install Banner -->
    <div id="pwa-install-banner" role="complementary" aria-label="Install app">
      <div class="banner-text">
        <strong>📱 Install TodosApp</strong>
        Add to your home screen for quick access &amp; offline use
      </div>
      <button class="btn-install" id="pwa-install-btn">Install</button>
      <button class="btn-dismiss" id="pwa-dismiss-btn" aria-label="Dismiss">&times;</button>
    </div>

    <!-- jQuery and Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>

    <script>
      // ── Service Worker Registration ──────────────────────────────────
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .catch(function (err) {
              console.warn('SW registration failed:', err);
            });
        });
      }

      // ── PWA Install Prompt ───────────────────────────────────────────
      let deferredPrompt = null;
      const installBanner = document.getElementById('pwa-install-banner');
      const installBtn    = document.getElementById('pwa-install-btn');
      const dismissBtn    = document.getElementById('pwa-dismiss-btn');

      // Only show if user hasn't dismissed before
      const dismissed = localStorage.getItem('pwa-banner-dismissed');

      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        if (!dismissed) {
          installBanner.classList.add('show');
        }
      });

      installBtn.addEventListener('click', function () {
        installBanner.classList.remove('show');
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function (choice) {
            deferredPrompt = null;
          });
        }
      });

      dismissBtn.addEventListener('click', function () {
        installBanner.classList.remove('show');
        localStorage.setItem('pwa-banner-dismissed', '1');
      });

      // Hide banner once installed
      window.addEventListener('appinstalled', function () {
        installBanner.classList.remove('show');
        deferredPrompt = null;
      });
    </script>

    {% if user.is_authenticated %}
    <script>
      // ── Reminder System ──────────────────────────────────────────────
      const REMINDER_INTERVAL_MS  = 6 * 60 * 1000; // 6 minutes
      const REMINDER_API_URL      = '/api/reminders/';
      const TOAST_AUTO_DISMISS_MS = 12000;

      function requestNotificationPermission() {
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
      }

      function showBrowserNotification(title, body) {
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification(title, {
            body: body,
            icon: '/static/icons/icon-192.svg',
          });
        }
      }

      function showToast(task) {
        const container = document.getElementById('reminder-container');
        const toastId   = 'toast-' + task.id + '-' + Date.now();
        let dueInfo = '';
        if (task.due_date) {
          dueInfo = `<span class="badge badge-warning ml-1">Due: ${task.due_date}${task.due_time ? ' ' + task.due_time : ''}</span>`;
        }
        const toast = document.createElement('div');
        toast.className = 'reminder-toast';
        toast.setAttribute('role', 'alert');
        toast.id = toastId;
        toast.innerHTML = `
          <span class="toast-icon"><i class="fas fa-bell"></i></span>
          <div class="toast-body">
            <div class="toast-title">⏰ Task Reminder</div>
            <div class="toast-text">${escapeHtml(task.content)} ${dueInfo}</div>
          </div>
          <button class="toast-close" aria-label="Dismiss" onclick="dismissToast('${toastId}')">&times;</button>
        `;
        container.appendChild(toast);
        setTimeout(() => dismissToast(toastId), TOAST_AUTO_DISMISS_MS);
      }

      function dismissToast(id) {
        const el = document.getElementById(id);
        if (el) {
          el.style.opacity = '0';
          el.style.transition = 'opacity 0.4s';
          setTimeout(() => el && el.remove(), 400);
        }
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
      }

      function fetchAndShowReminders() {
        fetch(REMINDER_API_URL, {
          method: 'GET',
          headers: { 'X-Requested-With': 'XMLHttpRequest' },
          credentials: 'same-origin',
        })
          .then((res) => { if (!res.ok) return; return res.json(); })
          .then((data) => {
            if (!data || !data.reminders || data.reminders.length === 0) return;
            data.reminders.forEach((task) => {
              showToast(task);
              showBrowserNotification('📝 TodosApp Reminder', `Don't forget: ${task.content}`);
            });
          })
          .catch(() => {});
      }

      document.addEventListener('DOMContentLoaded', function () {
        requestNotificationPermission();
        fetchAndShowReminders();
        setInterval(fetchAndShowReminders, REMINDER_INTERVAL_MS);
      });
    </script>
    {% endif %}

    {% block extra_js %}{% endblock %}
  </body>
</html>
