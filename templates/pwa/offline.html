<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Offline - TodosApp</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
    .offline-icon { font-size: 5rem; margin-bottom: 1rem; }
    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 420px;
    }
    .btn-retry {
      background: white;
      color: #667eea;
      font-weight: bold;
      border-radius: 50px;
      padding: 10px 30px;
      border: none;
      margin-top: 1rem;
    }
    .btn-retry:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="offline-icon">📵</div>
    <h2>You're Offline</h2>
    <p class="mb-3">No internet connection right now. Your tasks are waiting for you when you're back online.</p>
    <button class="btn-retry" onclick="window.location.reload()">
      🔄 Try Again
    </button>
  </div>
</body>
</html>
