{% extends "partials/base.html" %}
{% block title %}Delete Task - TodosApp{% endblock %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8 col-sm-10">
      <div class="card shadow-lg">
        <div class="card-header bg-danger text-white text-center">
          <h3 class="card-title mb-0"><i class="fas fa-trash"></i> Delete Task</h3>
        </div>
        <div class="card-body">
          <div class="alert alert-danger">
            <h5 class="mb-1">Are you sure you want to delete this task?</h5>
            <p class="mb-0"><strong>"{{ todo.content }}"</strong></p>
          </div>
          <form method="POST">
            {% csrf_token %}
            <div class="d-flex justify-content-between">
              <a class="btn btn-secondary" href="{% url 'todo-index' %}">
                <i class="fas fa-arrow-left"></i> Cancel
              </a>
              <button class="btn btn-danger" type="submit">
                <i class="fas fa-trash"></i> Yes, Delete
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
